# =============================================
# WEX Purchase API - Local Development Profile
# Active with: mvn spring-boot:run -Dspring.profiles.active=local
# or set SPRING_PROFILES_ACTIVE=local in your shell
#
# Expects a local MySQL instance running on port 3306.
# Quick start with Docker:
#   docker run --name wex-mysql \
#     -e MYSQL_ROOT_PASSWORD=root \
#     -e MYSQL_DATABASE=purchasedb \
#     -e MYSQL_USER=wex_user \
#     -e MYSQL_PASSWORD=wex_pass \
#     -p 3306:3306 -d mysql:8.0
# =============================================

spring.datasource.url=jdbc:mysql://localhost:3306/purchasedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=wex_user
spring.datasource.password=wex_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
