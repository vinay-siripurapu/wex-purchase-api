# =============================================
# WEX Purchase API - Application Configuration
# =============================================

spring.application.name=wex-purchase-api
server.port=8080

# --- Datasource (Aurora MySQL) ---
# Credentials and host are injected via environment variables.
# In AWS, these are sourced from Secrets Manager or ECS task environment.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP Connection Pool ---
# Tuned for Aurora MySQL multi-AZ; Aurora can handle ~1000 max connections
# per instance. Pool sized conservatively per application node.
spring.datasource.hikari.pool-name=WexHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Aurora failover: validate connection before use
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000

# --- JPA ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ddl-auto=none — schema is managed exclusively by Flyway migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# --- Treasury API ---
treasury.api.base-url=https://api.fiscaldata.treasury.gov/services/api/v1/accounting/od/rates_of_exchange
treasury.api.connect-timeout-ms=5000
treasury.api.read-timeout-ms=10000

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# --- Actuator (health checks for AWS ALB / ECS) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
