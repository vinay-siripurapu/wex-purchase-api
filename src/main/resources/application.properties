# =============================================
# WEX Purchase API - Application Configuration
# =============================================

spring.application.name=wex-purchase-api
server.port=8080

# --- JPA / Datasource ---
# H2 in-memory DB suitable for development and testing.
# For production, override these properties with a real DB (e.g. PostgreSQL).
spring.datasource.url=jdbc:h2:mem:purchasedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Treasury API ---
treasury.api.base-url=https://api.fiscaldata.treasury.gov/services/api/v1/accounting/od/rates_of_exchange
treasury.api.connect-timeout-ms=5000
treasury.api.read-timeout-ms=10000

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
