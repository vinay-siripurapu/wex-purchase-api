# =============================================
# WEX Purchase API - Test Profile
# Used by all tests via @ActiveProfiles("test")
#
# Testcontainers spins up a real MySQL 8.0 Docker container.
# The datasource URL is overridden dynamically via @DynamicPropertySource
# in the integration test base class.
# =============================================

# Flyway runs migrations against the Testcontainers MySQL instance
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Treasury API base URL — overridden per test class with WireMock port
treasury.api.base-url=http://localhost:0

# Actuator
management.endpoints.web.exposure.include=health
